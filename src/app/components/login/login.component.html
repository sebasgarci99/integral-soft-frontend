<div class="login-split">

    <!-- Columna izquierda: branding -->
    <section class="login-brand">
        <div class="login-shapes">
            <div class="login-shape login-shape-1"></div>
            <div class="login-shape login-shape-2"></div>
            <div class="login-shape login-shape-3"></div>
        </div>

        <div class="login-brand-logo">
            <img src="logo.png" alt="Integral-soft" class="login-brand-logo-img" />
        </div>
    </section>

    <!-- Columna derecha: formulario -->
    <section class="login-form-area">

        <!-- Logo móvil -->
        <div class="login-mobile-logo">
            <img src="logo.png" alt="Integral-soft" />
        </div>

        <div class="login-panel">
            <div class="login-panel-header">
                <h2 class="login-title">Bienvenido</h2>
                <p class="login-subtitle">Ingresa tus credenciales para continuar</p>
            </div>

            <form [formGroup]="formLogin" (ngSubmit)="iniciarSesion()" novalidate>
                <div class="form-group">
                    <label for="emailInput" class="form-label">Correo electrónico o usuario</label>
                    <div class="input-wrapper">
                        <i class="fas fa-user input-icon-left"></i>
                        <input type="text" id="emailInput" class="form-input" placeholder="Ingresa tu correo"
                            formControlName="username" autocomplete="username" />
                    </div>
                    <div class="invalid-feedback"
                        *ngIf="formLogin.get('username')?.invalid && formLogin.get('username')?.touched">
                        Correo o usuario inválido.
                    </div>
                </div>

                <div class="form-group">
                    <label for="passwordInput" class="form-label">Contraseña</label>
                    <div class="input-wrapper">
                        <i class="fas fa-lock input-icon-left"></i>
                        <input [type]="showPassword ? 'text' : 'password'" id="passwordInput" class="form-input"
                            placeholder="Ingresa tu contraseña" formControlName="password"
                            autocomplete="current-password" />
                        <button type="button" class="btn-toggle-password" (click)="togglePassword()" tabindex="-1">
                            <i [class]="showPassword ? 'fas fa-eye-slash' : 'fas fa-eye'"></i>
                        </button>
                    </div>
                    <div class="invalid-feedback"
                        *ngIf="formLogin.get('password')?.invalid && formLogin.get('password')?.touched">
                        Contraseña inválida.
                    </div>
                </div>

                <div class="form-check mb-4">
                    <input type="checkbox" id="recordarCheck" class="form-check-input" [(ngModel)]="recordar"
                        name="recordar" [ngModelOptions]="{standalone: true}" />
                    <label for="recordarCheck" class="form-check-label">
                        Recordar mi usuario
                    </label>
                </div>

                <button type="submit" class="btn-login" [disabled]="cargando">
                    <span *ngIf="!cargando">
                        <i class="fa-solid fa-arrow-right-to-bracket"></i> Iniciar sesión
                    </span>
                    <span *ngIf="cargando" class="btn-login-loading">
                        <i class="fa fa-circle-notch fa-spin"></i> Iniciando...
                    </span>
                </button>
            </form>
        </div>

    </section>

</div>
