
<div class="dashboard-container" *ngIf="datosUsuario.idRol == '1'">

    <header class="dashboard-header">
        <div class="header-content">
            <div class="header-title">
                <span class="header-icon">
                    <i class="fa fa-chart-pie"></i>
                </span>
                <div class="header-text">
                    <h1>Panel de Control</h1>
                    <p>Visualiza el rendimiento de tu operación en tiempo real</p>
                </div>
            </div>
            <span class="dashboard-date">{{ hoy | date: 'EEEE, d MMMM y' }}</span>
        </div>
    </header>

    <section class="charts-grid">
        <article class="chart-card" *ngFor="let grafica of graficaxUsuario; let i = index">
            
            <div class="chart-card-header">
                <div class="chart-title">
                    <span class="chart-number">{{ i + 1 | number: '2.0' }}</span>
                    <h3>{{ grafica.titulo }}</h3>
                </div>
                <span class="chart-badge" [ngClass]="'badge-' + grafica.tipoGrafica">
                    {{ grafica.tipoGrafica }}
                </span>
            </div>

            <div class="chart-card-body">
                <p-chart [type]="grafica.tipoGrafica" [data]="grafica.chartData"
                    [options]="grafica.configOptions" style="width: 100%; height: 100%;">
                </p-chart>
            </div>

        </article>
    </section>

</div>
