<nav id="sidebarMenu" class="sidebar collapse d-lg-block" #sidebarRef>

    <!-- Header con logo -->
    <div class="sidebar-brand">
        <a routerLink="/home" routerLinkActive="active">
            <img src="logo.png" alt="Integral-soft logo" />
        </a>
        <button class="sidebar-close-btn d-lg-none" type="button" (click)="cerrarSidebar()">
            <i class="fa fa-times"></i>
        </button>
    </div>

    <!-- Menú de navegación -->
    <div class="sidebar-nav-scroll">
        <ul class="sidebar-menu">

            <!-- Módulos directos -->
            <li *ngFor="let item of modulosDirectos">
                <a class="sidebar-link" [routerLink]="item.ruta" routerLinkActive="active"
                    [routerLinkActiveOptions]="{ exact: true }" (click)="cerrarSidebarMovil()">
                    <i [class]="item.icono"></i>
                    <span>{{ item.modulo }}</span>
                </a>
            </li>

            <!-- Grupos colapsables -->
            <li *ngFor="let grupo of modulosAgrupados"
                [class.sidebar-group-active]="isGrupoActivo(grupo)">
                <a class="sidebar-link sidebar-group" data-bs-toggle="collapse"
                    [attr.data-bs-target]="'#' + getGrupoId(grupo.modulo)" role="button"
                    [class.sidebar-group-open]="isGrupoAbierto(grupo)"
                    (click)="toggleGrupo(grupo)">
                    <span class="sidebar-group-label">
                        <i [class]="grupo.icono"></i>
                        <span>{{ grupo.modulo }}</span>
                    </span>
                    <i class="fa fa-chevron-down sidebar-chevron"></i>
                </a>

                <div class="collapse" [class.show]="isGrupoAbierto(grupo)" [id]="getGrupoId(grupo.modulo)">
                    <ul class="sidebar-submenu">
                        <li *ngFor="let hijo of grupo.hijos">
                            <a class="sidebar-link" *ngIf="hijo.ruta" [routerLink]="hijo.ruta"
                                routerLinkActive="active" [routerLinkActiveOptions]="{ exact: true }"
                                (click)="cerrarSidebarMovil()">
                                <i [class]="hijo.icono"></i>
                                <span>{{ hijo.modulo }}</span>
                            </a>
                        </li>
                    </ul>
                </div>
            </li>

        </ul>
    </div>

    <!-- Footer de usuario -->
    <div class="sidebar-footer">
        <div class="sidebar-user" (click)="toggleUserMenu()">
            <img [src]="logo" alt="Usuario" />
            <div class="sidebar-user-info">
                <span class="sidebar-user-name">{{ nombreCompleto }}</span>
                <span class="sidebar-user-role">{{ rolUsuario }}</span>
            </div>
            <i class="fa fa-chevron-down sidebar-user-chevron"
                [class.sidebar-user-chevron-open]="userMenuAbierto"></i>
        </div>

        <ul class="sidebar-user-menu" *ngIf="userMenuAbierto">
            <li *ngIf="idRol == '1'">
                <a routerLink="/info-usuario" (click)="cerrarSidebarMovil()">
                    <i class="fa fa-cog"></i> Ajustes
                </a>
            </li>
            <li class="sidebar-user-divider" *ngIf="idRol == '1'"></li>
            <li>
                <a class="logout" (click)="cerrarSesion()">
                    <i class="fa fa-sign-out-alt"></i> Cerrar sesión
                </a>
            </li>
        </ul>
    </div>

</nav>

<!-- Overlay para móvil -->
<div class="sidebar-overlay" [class.show]="sidebarAbierto" (click)="cerrarSidebar()"></div>
